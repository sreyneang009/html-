<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hello::before {
            content: "**";
            margin-right: 5px;
            color: aqua;
        }

        .hello::after {
            content: "🐣";
            margin-left: 5px;
            color: aqua;

        }

        .box {
            margin-top: 20px;
            width: 200px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: bisque;
            position: relative;
        }

        .box::before {
            content: "$$";
            top: -10px;
            font-size: 20px;
            color: white;
        }

        .profile {
            margin-top: 20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #777;
            position: relative;

        }

        .profile>img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .profile::before {
            content: "";
            position: absolute;
            bottom: 4px;
            right: 10px;
            background-color: beige;
            border-radius: 50%;
            width: 15px;
            height: 15px;
        }
    </style>
</head>

<body>
    <h1>Learn pesudo</h1>
    <div class="box">
        <p>This is a box.</p>
    </div>
    <div class="profile">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRij9D1U2_wDSIUrojQH0hIU3qqICyl-Z10SXLSMzPT-A&s=10"
            alt="profile picture">
    </div>
</body>

</html>
